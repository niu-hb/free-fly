allow-lan: true
bind-address: '*'
dns:
  cache-algorithm: arc
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - '*.lan'
    - '*.localdomain'
    - '*.example'
    - '*.invalid'
    - '*.localhost'
    - '*.test'
    - '*.local'
    - +.msftconnecttest.com
    - +.msftncsi.com
  fake-ip-range: 198.18.0.1/16
  ipv6: true
  listen: 0.0.0.0:1053
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    rule-set:domestic_non_ip,direct_non_ip:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  respect-rules: true
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-name: metacubexd
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
geodata-loader: standard
geodata-mode: true
ipv6: true
keep-alive-interval: 30
log-level: warning
mixed-port: 7893
mode: rule
port: 7890
profile:
  store-fake-ip: true
  store-selected: true

